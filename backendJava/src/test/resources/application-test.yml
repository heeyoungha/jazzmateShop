# src/test/resources/application-test.yml
# 통합 테스트(@SpringBootTest) 전용 설정

spring:
  datasource:
    url: jdbc:h2:mem:jazzmate_test;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect
    show-sql: false
    properties:
      hibernate:
        format_sql: false

  # ElementCollection (user_review_tags) H2 호환
  h2:
    console:
      enabled: false

# AI 서비스 URL — 통합 테스트에서는 MockBean으로 교체
ai:
  service:
    url: http://localhost:9999  # 실제 연결 안 됨 (MockBean 사용)

logging:
  level:
    shop.jazzmate: DEBUG
    org.springframework.web: WARN
    org.hibernate.SQL: WARN