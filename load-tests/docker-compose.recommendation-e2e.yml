services:
  e2e-db:
    image: postgres:16-alpine
    command:
      - "postgres"
      - "-c"
      - "log_min_duration_statement=300"
      - "-c"
      - "log_lock_waits=on"
      - "-c"
      - "deadlock_timeout=200ms"
    environment:
      POSTGRES_DB: jazzmate_e2e_loadtest
      POSTGRES_USER: jazzmate
      POSTGRES_PASSWORD: jazzmate
    ports:
      - "54330:5432"
    volumes:
      - ./polling-fake-db-init.sql:/docker-entrypoint-initdb.d/001_e2e_fake_db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jazzmate -d jazzmate_e2e_loadtest"]
      interval: 5s
      timeout: 5s
      retries: 20

  # Real OpenAI/Supabase AI API. Keep this block for real E2E runs.
  #
  # ai-api:
  #   build:
  #     context: ../backendPython
  #     dockerfile: Dockerfile
  #   depends_on:
  #     e2e-db:
  #       condition: service_healthy
  #   ports:
  #     - "8000:8000"
  #   environment:
  #     SPRING_BASE_URL: http://java-backend:8080
  #     SUPABASE_URL: ${SUPABASE_URL:-}
  #     SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:-}
  #     OPENAI_API_KEY: ${OPENAI_API_KEY:-}
  #     OPENAI_EMBEDDING_MODEL: ${OPENAI_EMBEDDING_MODEL:-text-embedding-3-small}
  #     OPENAI_CHAT_MODEL: ${OPENAI_CHAT_MODEL:-gpt-4o-mini}
  #     OPENAI_TIMEOUT_SECONDS: ${OPENAI_TIMEOUT_SECONDS:-30}
  #     OPENAI_MAX_RETRIES: ${OPENAI_MAX_RETRIES:-2}
  #     EMBEDDING_DIMENSIONS: ${EMBEDDING_DIMENSIONS:-1536}
  #     RECOMMENDATION_TOP_K: ${RECOMMENDATION_TOP_K:-5}

  ai-api:
    build:
      context: ../backendPython
      dockerfile: Dockerfile
    depends_on:
      e2e-db:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./mock-ai-api:/mock-ai-api:ro
    environment:
      SPRING_BASE_URL: http://java-backend:8080
      MOCK_EMBEDDING_DELAY_MS: ${MOCK_EMBEDDING_DELAY_MS:-300}
      MOCK_REASON_DELAY_MS: ${MOCK_REASON_DELAY_MS:-700}
      MOCK_CALLBACK_TIMEOUT_SECONDS: ${MOCK_CALLBACK_TIMEOUT_SECONDS:-10}
      MOCK_RECOMMENDATION_COUNT: ${MOCK_RECOMMENDATION_COUNT:-5}
    command: ["uvicorn", "main:app", "--app-dir", "/mock-ai-api", "--host", "0.0.0.0", "--port", "8000"]

  java-backend:
    build:
      context: ../backendJava
      dockerfile: Dockerfile
    depends_on:
      e2e-db:
        condition: service_healthy
      ai-api:
        condition: service_started
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: production
      SPRING_DATASOURCE_URL: jdbc:postgresql://e2e-db:5432/jazzmate_e2e_loadtest
      SPRING_DATASOURCE_USERNAME: jazzmate
      SPRING_DATASOURCE_PASSWORD: jazzmate
      AI_SERVICE_URL: http://ai-api:8000
      SPRING_BASE_URL: http://java-backend:8080
      MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: health,metrics,prometheus
      MANAGEMENT_ENDPOINT_HEALTH_SHOW_DETAILS: always
      SERVER_TOMCAT_MBEANREGISTRY_ENABLED: "true"

  prometheus:
    image: prom/prometheus:v3.0.1
    depends_on:
      java-backend:
        condition: service_started
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=2h"

  grafana:
    image: grafana/grafana:11.3.1
    depends_on:
      prometheus:
        condition: service_started
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
